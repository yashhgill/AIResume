<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Resumes — AI Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resume_generator/assets/site-theme.css">
    <link rel="icon" href="/resume_generator/assets/airesume-logo.svg" type="image/svg+xml" />
    <style>
      .card-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px }
      @media(max-width:1000px){ .card-grid{ grid-template-columns:repeat(2,1fr);} }
      @media(max-width:640px){ .card-grid{ grid-template-columns:repeat(1,1fr);} }
      .resume-card{ border-radius:12px; overflow:hidden; box-shadow:0 12px 40px rgba(10,20,40,0.06); background:#fff; border:1px solid rgba(0,0,0,0.03) }
      .resume-thumb{ height:180px; display:flex;align-items:center;justify-content:center;background:#fbfdff; position:relative; overflow:hidden }
      .resume-thumb iframe{ 
        border:none; 
        pointer-events:none; 
        transform:scale(0.2); 
        transform-origin:top left; 
        width:500%; 
        height:500%;
        position:absolute;
        top:0;
        left:0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="/resume_generator/assets/airesume-logo.svg" alt="AI Resume" style="height:36px; margin-right:10px;"/>
          <span class="fw-bold">AI Resume</span>
        </a>
        <div>
          <button id="btn-back" class="btn btn-outline-secondary">Back</button>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 ar-animate">
          <div>
            <h2 class="mb-0 ar-gradient-text fw-bold">My Resumes</h2>
            <div class="text-muted small">Resume history generated by AI</div>
          </div>
          <div>
            <button id="btn-new" class="btn btn-primary">Create new</button>
          </div>
        </div>

        <div id="list-area">
          <div class="text-center text-muted">Loading…</div>
        </div>
      </div>
    </main>

    <script src="/resume_generator/assets/app-config.js"></script>
    <script>
      const API_BASE = window.AR_resolveApiBase();

      // decode token payload helper
      function getTokenPayload(){
        const token = localStorage.getItem('rg_token');
        if (!token) return null;
        try{ const p = token.split('.')[1]; return JSON.parse(atob(p)); }catch(e){return null}
      }

      document.getElementById('btn-back').addEventListener('click', ()=> window.location.href='index.html');
      document.getElementById('btn-new').addEventListener('click', ()=> window.location.href='onboard/templates.html');

      (async function(){
        const payload = getTokenPayload();
        if (!payload || !payload.user_id){
          // not logged in
          document.getElementById('list-area').innerHTML = `<div class="alert alert-warning">Please <a href="login.html">login</a> to view your resumes.</div>`;
          return;
        }
        const userId = payload.user_id;
        const area = document.getElementById('list-area');
        area.innerHTML = '<div class="text-center text-muted">Loading…</div>';
        try{
          const res = await fetch(API_BASE + '/resumes.php?user_id='+encodeURIComponent(userId));
          if (!res.ok){ area.innerHTML = '<div class="alert alert-danger">Failed to load resumes.</div>'; return; }
          const list = await res.json();
          if (!Array.isArray(list) || list.length===0){ area.innerHTML = '<div class="alert alert-info">You have no resumes yet. Click "Create new" to start.</div>'; return; }

          const grid = document.createElement('div'); grid.className = 'card-grid';
          list.forEach(r=>{
            const card = document.createElement('div'); card.className = 'resume-card p-3';
            // Use iframe to show resume preview if resume_id exists, otherwise fallback to SVG
            const previewHtml = r.resume_id
              ? `<iframe src="${API_BASE}/view_resume.php?id=${r.resume_id}&preview=1"></iframe>`
              : `<img src="/resume_generator/assets/airesume-logo.svg" style="max-width:100%; max-height:100%;"/>`;
            card.innerHTML = `
              <div class="resume-thumb">${previewHtml}</div>
              <div style="padding:12px">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div>
                    <div style="font-weight:700">${r.field || 'Resume'}</div>
                    <div class="text-muted small">Created: ${r.created_at || r.created || ''}</div>
                  </div>
                </div>
                <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
                  ${r.resume_id? '<div class="btn-group"><a class="btn btn-outline-secondary btn-sm" href="'+API_BASE+'/view_resume.php?id='+r.resume_id+'" target="_blank">View</a><a class="btn btn-outline-primary btn-sm" href="'+API_BASE+'/view_resume.php?id='+r.resume_id+'&autoedit=1">Edit</a><a class="btn btn-outline-primary btn-sm" href="'+API_BASE+'/view_resume.php?id='+r.resume_id+'&autodownload=1" target="_blank">Download</a></div>' : ''}
                  <button class="btn btn-danger btn-sm btn-delete">Delete</button>
                </div>
              </div>
            `;

            // delete handler
            card.querySelector('.btn-delete').addEventListener('click', async ()=>{
              if (!confirm('Delete this resume?')) return;
              try{
                const del = await fetch(API_BASE + '/resumes.php?id='+encodeURIComponent(r.resume_id), { method: 'DELETE' });
                if (del.ok){ card.remove(); } else { alert('Delete failed'); }
              }catch(e){ alert('Network error'); }
            });

            grid.appendChild(card);
          });

          area.innerHTML = '';
          area.appendChild(grid);

        }catch(e){ console.error(e); document.getElementById('list-area').innerHTML = '<div class="alert alert-danger">Error loading resumes.</div>'; }
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/resume_generator/assets/three-bg.js"></script>
  </body>
</html>
