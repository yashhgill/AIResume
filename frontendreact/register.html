<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — AI Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resume_generator/assets/site-theme.css">
    <link rel="icon" href="/resume_generator/assets/airesume-logo.svg" type="image/svg+xml" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
      .auth-card{ width:100%; max-width:520px; padding:32px; box-shadow:0 20px 60px rgba(31,38,135,0.18); }
      .auth-title{ font-size:28px; margin-bottom:8px; font-weight:800; }
    </style>
  </head>
  <body class="p-4">
    <div class="auth-card ar-animate">
      <div class="text-center mb-3"><img src="/resume_generator/assets/airesume-logo.svg" alt="AI Resume" style="height:64px;"/></div>
      <div class="auth-title ar-gradient-text text-center">Create your account</div>
      <p class="text-muted text-center">Register to manage your resumes with <strong>AI Resume</strong>.</p>

      <div id="google-btn-container" class="ar-google-btn-wrap mb-2"></div>
      <div class="ar-divider">or register with email</div>

      <form id="regForm">
        <div class="mb-2"><input id="name" class="form-control" placeholder="Full name" autocomplete="name"/></div>
        <div class="mb-2"><input id="email" class="form-control" placeholder="Email" autocomplete="email"/></div>
        <div class="mb-2"><input id="phone" class="form-control" placeholder="Phone number (optional)"/></div>
        <div class="mb-2"><input id="password" type="password" class="form-control" placeholder="Password (min 6 characters)" autocomplete="new-password"/></div>
        <div class="mb-2"><input id="confirm_password" type="password" class="form-control" placeholder="Confirm password" autocomplete="new-password"/></div>
        <div id="reg-error" class="alert alert-danger py-2" style="display:none;font-size:13px"></div>
        <div id="reg-success" class="alert alert-success py-2" style="display:none;font-size:13px">Account created! Taking you to setup your profile…</div>
        <div class="mb-2"><button id="reg-btn" class="btn btn-primary w-100" type="submit">Create Account</button></div>
      </form>
      <p class="text-center">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/resume_generator/assets/three-bg.js"></script>
    <script src="/resume_generator/assets/app-config.js"></script>
    <script>
      window.AR_renderGoogleButton('google-btn-container', 'onboard/start.html');

      const API_BASE = window.AR_resolveApiBase();
      const errEl  = document.getElementById('reg-error');
      const okEl   = document.getElementById('reg-success');
      const regBtn = document.getElementById('reg-btn');

      function showErr(msg) { errEl.textContent = msg; errEl.style.display='block'; okEl.style.display='none'; regBtn.disabled=false; regBtn.textContent='Create Account'; }

      document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.style.display = 'none';
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const phone    = document.getElementById('phone').value.trim();
        const confirm  = document.getElementById('confirm_password').value;

        if (!name || !email || !password) return showErr('Please fill in name, email and password.');
        if (password !== confirm)         return showErr('Passwords do not match.');
        if (password.length < 6)          return showErr('Password must be at least 6 characters.');

        regBtn.disabled = true; regBtn.textContent = 'Creating account…';

        try {
          // 1) Create the account
          const res  = await fetch(API_BASE + '/users.php', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ name, email, phone: phone || null, password })
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch(pe) { return showErr('Server error — please try again.'); }

          if (!res.ok || !j.user_id) return showErr(j.error || j.message || 'Registration failed.');

          // 2) Auto-login immediately so the user doesn't have to log in again
          const loginRes = await fetch(API_BASE + '/auth.php', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'login', email, password })
          });
          const loginData = await loginRes.json();
          if (loginData.token) {
            localStorage.setItem('rg_token', loginData.token);
          }

          // 3) Show success and redirect to wizard
          okEl.style.display = 'block';
          setTimeout(() => { window.location.href = 'onboard/start.html'; }, 1200);

        } catch (err) {
          showErr('Network error — please check your connection.');
        }
      });
    </script>
  </body>
</html>
