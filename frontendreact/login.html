<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — AI Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resume_generator/assets/site-theme.css">
    <link rel="icon" href="/resume_generator/assets/airesume-logo.svg" type="image/svg+xml" />
    <style>
      body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
      .auth-card{ width:100%; max-width:420px; padding:32px; box-shadow:0 20px 60px rgba(31,38,135,0.18); }
      .auth-title{ font-size:28px; margin-bottom:18px; font-weight:800; }
      .auth-note{ margin-top:12px; }
    </style>
  </head>
  <body class="p-4">
    <div class="auth-card ar-animate">
      <div class="text-center mb-3"><img src="/resume_generator/assets/airesume-logo.svg" alt="AI Resume" style="height:64px;"/></div>
      <div class="text-center auth-title ar-gradient-text">Welcome back</div>
      <p class="text-muted text-center">Sign in to continue to <strong>AI Resume</strong>.</p>


      <form id="loginForm">
        <div class="mb-2"><input id="email" class="form-control" placeholder="Email" autocomplete="email"/></div>
        <div class="mb-2"><input id="password" type="password" class="form-control" placeholder="Password" autocomplete="current-password"/></div>
        <div id="login-error" class="alert alert-danger py-2" style="display:none;font-size:13px"></div>
        <div class="mb-2"><button id="login-btn" class="btn btn-primary w-100" type="submit">Login</button></div>
      </form>
      <p class="auth-note text-center">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/resume_generator/assets/three-bg.js"></script>
    <script src="/resume_generator/assets/app-config.js"></script>
    <script>

      const API_BASE = window.AR_resolveApiBase();
      const errEl  = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      // Show session-expired message if redirected here
      if (new URLSearchParams(window.location.search).get('expired')) {
        errEl.textContent = 'Your session expired — please log in again.';
        errEl.style.display = 'block';
      }

      // If already logged in and token not expired, go straight to dashboard
      (function(){
        const t = localStorage.getItem('rg_token');
        if (!t) return;
        try {
          const p = JSON.parse(atob(t.split('.')[1]));
          if (p.exp && Date.now()/1000 < p.exp) window.location.href = 'my-resumes.html';
        } catch(e){}
      })();

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.style.display = 'none';
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display='block'; return; }
        loginBtn.disabled = true; loginBtn.textContent = 'Logging in…';
        try {
          const res = await fetch(API_BASE + '/auth.php', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'login', email, password })
          });
          const j = await res.json();
          if (j.token) {
            localStorage.setItem('rg_token', j.token);
            window.location.href = 'my-resumes.html';
          } else {
            errEl.textContent = j.error || 'Login failed. Please check your credentials.';
            errEl.style.display = 'block';
            loginBtn.disabled = false; loginBtn.textContent = 'Login';
          }
        } catch (err) {
          errEl.textContent = 'Network error — please check your connection.';
          errEl.style.display = 'block';
          loginBtn.disabled = false; loginBtn.textContent = 'Login';
        }
      });
    </script>
  </body>
</html>
