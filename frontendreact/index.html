<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Resume — Build a standout resume in minutes</title>
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resume_generator/assets/site-theme.css">
    <link rel="icon" href="/resume_generator/assets/airesume-logo.svg" type="image/svg+xml" />
    <!-- Tailwind CDN (for utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React + Babel (for quick demo, not for production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-transparent px-4 py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="/resume_generator/assets/airesume-logo.svg" alt="AI Resume" style="height:36px; margin-right:10px;"/>
          <span class="fw-bold">AI Resume</span>
        </a>
        <div>
          <button id="nav-login" class="btn btn-outline-primary me-2">Login</button>
          <button id="nav-register" class="btn btn-primary">Get Started</button>
        </div>
      </div>
    </nav>

    <div id="main-landing"></div>

    <script>
      // Build landing HTML inside #main-landing
      document.getElementById('main-landing').innerHTML = `
        <header class="hero" style="padding:100px 0 80px;">
          <div class="container">
            <div class="row align-items-center">
              <div class="col-md-6 ar-animate ar-animate-1">
                <h1 class="display-4 fw-bold">Build a <span class="ar-gradient-text">standout resume</span> in minutes</h1>
                <p class="lead text-muted">Use AI-powered templates and suggestions to create a resume that stands out. Easy edits, export to PDF, and tailored content for your field.</p>
                <div class="mt-4">
                  <button id="cta-register" class="btn btn-primary btn-lg me-2">Get Started — It's Free</button>
                  <button id="cta-demo" class="btn btn-outline-secondary btn-lg">See Examples</button>
                </div>
                <ul class="list-inline text-muted small mt-4">
                  <li class="list-inline-item">Trusted by professionals</li>
                  <li class="list-inline-item">·</li>
                  <li class="list-inline-item">Export as PDF</li>
                  <li class="list-inline-item">·</li>
                  <li class="list-inline-item">AI assistance</li>
                </ul>
              </div>
              <div class="col-md-6 text-center d-none d-md-block ar-animate ar-animate-2">
                <div class="card" style="display:inline-block; width:420px; overflow:hidden;">
                  <div style="background:linear-gradient(120deg,#7c3aed,#ec4899); padding:22px 24px; text-align:left;">
                    <div style="display:flex; align-items:center; gap:12px;">
                      <div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;">AI</div>
                      <div>
                        <div style="color:#fff; font-weight:700; font-size:17px;">Jordan Lee</div>
                        <div style="color:rgba(255,255,255,0.85); font-size:13px;">Software Engineer</div>
                      </div>
                    </div>
                  </div>
                  <div style="padding:20px; text-align:left;">
                    <div style="height:8px; width:85%; background:#eee; border-radius:4px; margin-bottom:8px;"></div>
                    <div style="height:8px; width:65%; background:#eee; border-radius:4px; margin-bottom:14px;"></div>
                    <div style="display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;">
                      <span style="background:#f3e8ff; color:#7c3aed; font-size:11px; padding:4px 10px; border-radius:999px;">React</span>
                      <span style="background:#fce7f3; color:#ec4899; font-size:11px; padding:4px 10px; border-radius:999px;">Node.js</span>
                      <span style="background:#dbeafe; color:#3b82f6; font-size:11px; padding:4px 10px; border-radius:999px;">SQL</span>
                    </div>
                    <h5 class="mb-1">Sample: Software Engineer</h5>
                    <p class="mb-0 text-muted small">Clean, concise, and tailored to the job you want — generated in seconds.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <section class="py-5">
          <div class="container">
            <div class="row text-center g-4">
              <div class="col-md-4 ar-animate ar-animate-1">
                <div class="card p-4 h-100">
                  <h5><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line></svg>Choose a template</h5>
                  <p class="text-muted small">Pick from modern, recruiter-friendly templates that highlight your strengths.</p>
                </div>
              </div>
              <div class="col-md-4 ar-animate ar-animate-2">
                <div class="card p-4 h-100">
                  <h5><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>AI-powered text</h5>
                  <p class="text-muted small">Auto-suggest bullet points and phrasing tailored to your experience and the role.</p>
                </div>
              </div>
              <div class="col-md-4 ar-animate ar-animate-3">
                <div class="card p-4 h-100">
                  <h5><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 12 15 15"></polyline></svg>Export to PDF</h5>
                  <p class="text-muted small">Download print-ready PDFs or share a link to your resume.</p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="py-5">
          <div class="container text-center">
            <h4 class="mb-4">How it works</h4>
            <div class="row g-4 justify-content-center">
              <div class="col-md-3 ar-animate ar-animate-1">
                <div class="card p-3">
                  <div class="mb-2 display-6 ar-gradient-text fw-bold">1</div>
                  <p class="small text-muted">Enter your details and select a template.</p>
                </div>
              </div>
              <div class="col-md-3 ar-animate ar-animate-2">
                <div class="card p-3">
                  <div class="mb-2 display-6 ar-gradient-text fw-bold">2</div>
                  <p class="small text-muted">Use AI suggestions to improve content.</p>
                </div>
              </div>
              <div class="col-md-3 ar-animate ar-animate-3">
                <div class="card p-3">
                  <div class="mb-2 display-6 ar-gradient-text fw-bold">3</div>
                  <p class="small text-muted">Export or share your finalized resume.</p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <footer class="py-4 text-center">
          <div class="container text-muted small">© 2026 AI Resume</div>
        </footer>
      `;

      // wire up buttons
      document.getElementById('nav-login').addEventListener('click', function(){ window.location.href='login.html'; });
      document.getElementById('nav-register').addEventListener('click', function(){ window.location.href='onboard/start.html'; });
      document.getElementById('cta-register').addEventListener('click', function(){ window.location.href='onboard/start.html'; });
      document.getElementById('cta-demo').addEventListener('click', function(){ window.location.href='onboard/templates.html'; });

      // token-aware nav replacement -> show user task bar when logged in
      (function(){
        const token = localStorage.getItem('rg_token');
        if (!token) return;
        // attempt to decode payload from token (header.payload.sig)
        let name = 'User';
        let email = '';
        try{
          const parts = token.split('.');
          if (parts.length === 3){
            const payload = JSON.parse(atob(parts[1]));
            if (payload && payload.name) name = payload.name;
            if (payload && payload.email) email = payload.email;
          }
        }catch(e){/* ignore decode errors */}

        const navLogin = document.getElementById('nav-login');
        const navRegister = document.getElementById('nav-register');
        const container = navRegister.parentElement;
        // build user task bar
        container.innerHTML = `
          <div id="user-tasks" class="d-flex align-items-center gap-2" style="flex-wrap:wrap; justify-content:flex-end;">
            <div id="user-avatar" style="width:40px;height:40px;border-radius:999px;background:#0d6efd;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">${(name.split(' ').map(s=>s[0]).slice(0,2).join('')||'U').toUpperCase()}</div>
            <div class="user-name-block" style="display:flex;flex-direction:column;align-items:flex-start;margin-right:6px;">
              <div style="font-weight:700;font-size:14px;">${name}</div>
              <div style="font-size:12px;color:#6b7280;">${email}</div>
            </div>
            <div style="position:relative;">
              <button id="user-menu-btn" class="btn btn-outline-primary">Tasks ▾</button>
              <div id="user-menu" style="position:absolute;right:0;top:44px;min-width:160px;background:#fff;border:1px solid #e6e6e6;border-radius:8px;box-shadow:0 12px 30px rgba(0,0,0,0.08);display:none;z-index:200;">
                <a href="profile.html" class="d-block px-3 py-2 text-decoration-none" style="color:#111">Profile</a>
                <a href="my-resumes.html" class="d-block px-3 py-2 text-decoration-none" style="color:#111">My Resumes</a>
                <div style="height:1px;background:#f1f5f9;margin:6px 0"></div>
                <a id="signout-btn" href="#" class="d-block px-3 py-2 text-decoration-none" style="color:#d32f2f">Sign out</a>
              </div>
            </div>
          </div>
        `;

        // menu toggle
        const menuBtn = document.getElementById('user-menu-btn');
        const menu = document.getElementById('user-menu');
        menuBtn.addEventListener('click', function(e){
          e.stopPropagation();
          menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });
        // close on outside click
        document.addEventListener('click', function(){ if (menu) menu.style.display = 'none'; });

        // sign out
        document.getElementById('signout-btn').addEventListener('click', function(e){
          e.preventDefault();
          try{ localStorage.removeItem('rg_token'); }catch(e){}
          window.location.replace('login.html');
        });
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/resume_generator/assets/three-bg.js"></script>
  </body>
</html>
