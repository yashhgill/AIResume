  <text x="400" y="75" font-family="Arial, sans-serif" font-size="12" fill="#bfdbfe" text-anchor="middle">Software Engineer | email@example.com | +1 234 567 890</text>
  
  <!-- Professional Summary -->
  <rect x="50" y="130" width="700" height="2" fill="#3b82f6"/>
