<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1000" fill="#ffffff"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="120" fill="#2c3e50"/>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">JOHN DOE</text>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1" text-anchor="middle">Software Engineer | email@example.com</text>
  
  <!-- Section: Professional Summary -->
  <rect x="40" y="150" width="720" height="2" fill="#34495e"/>
  <text x="40" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">PROFESSIONAL SUMMARY</text>
  <rect x="40" y="200" width="720" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Section: Experience -->
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">EXPERIENCE</text>
  <rect x="40" y="340" width="720" height="120" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <rect x="40" y="480" width="720" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Section: Education -->
  <text x="40" y="640" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">EDUCATION</text>
  <rect x="40" y="660" width="720" height="100" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Section: Skills -->
  <text x="40" y="800" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">SKILLS</text>
  <rect x="40" y="820" width="720" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Template Label -->
  <text x="400" y="980" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">Classic Template</text>
</svg>

