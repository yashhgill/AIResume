<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1000" fill="#ffffff"/>
  <!-- Two column layout header -->
  <rect x="0" y="0" width="800" height="120" fill="#1f2937"/>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">JOHN DOE</text>
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">Software Engineer | email@example.com</text>
  
  <!-- Left column -->
  <rect x="0" y="120" width="380" height="880" fill="#f9fafb"/>
  
  <text x="190" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">CONTACT</text>
  <rect x="30" y="190" width="320" height="80" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <text x="190" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">SKILLS</text>
  <rect x="30" y="330" width="320" height="200" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <text x="190" y="580" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">EDUCATION</text>
  <rect x="30" y="600" width="320" height="150" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <text x="190" y="800" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">LANGUAGES</text>
  <rect x="30" y="820" width="320" height="100" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Right column -->
  <rect x="400" y="120" width="400" height="880" fill="#ffffff"/>
  
  <text x="600" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">PROFESSIONAL SUMMARY</text>
  <rect x="420" y="190" width="360" height="100" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">WORK EXPERIENCE</text>
  <rect x="420" y="350" width="360" height="140" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="420" y="510" width="360" height="140" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  
  <text x="600" y="700" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">PROJECTS</text>
  <rect x="420" y="720" width="360" height="120" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Template Label -->
  <text x="400" y="980" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Two-Column Template</text>
</svg>

