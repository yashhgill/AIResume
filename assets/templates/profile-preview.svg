<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1000" fill="#ffffff"/>
  <!-- Profile header with photo area -->
  <rect x="0" y="0" width="800" height="180" fill="#6366f1"/>
  <circle cx="400" cy="90" r="50" fill="#ffffff" stroke="#e0e7ff" stroke-width="3"/>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">JOHN DOE</text>
  <text x="400" y="175" font-family="Arial, sans-serif" font-size="12" fill="#c7d2fe" text-anchor="middle">Software Engineer</text>
  
  <!-- Contact info sidebar -->
  <rect x="0" y="180" width="220" height="820" fill="#f8fafc"/>
  <text x="110" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1" text-anchor="middle">CONTACT</text>
  <rect x="20" y="240" width="180" height="100" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <text x="110" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1" text-anchor="middle">SKILLS</text>
  <rect x="20" y="400" width="180" height="180" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <text x="110" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1" text-anchor="middle">LANGUAGES</text>
  <rect x="20" y="640" width="180" height="100" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <!-- Main content -->
  <text x="260" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">PROFESSIONAL SUMMARY</text>
  <rect x="260" y="240" width="500" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <text x="260" y="370" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">WORK EXPERIENCE</text>
  <rect x="260" y="390" width="500" height="140" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <rect x="260" y="550" width="500" height="140" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <text x="260" y="730" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">EDUCATION</text>
  <rect x="260" y="750" width="500" height="120" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  
  <!-- Template Label -->
  <text x="400" y="980" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Profile Template</text>
</svg>

