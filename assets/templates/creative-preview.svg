<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1000" fill="#ffffff"/>
  <!-- Creative colorful header -->
  <rect x="0" y="0" width="800" height="150" fill="url(#gradient1)"/>
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45b7d1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">JOHN DOE</text>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Creative Software Engineer</text>
  
  <!-- Creative sections with colors -->
  <rect x="30" y="180" width="340" height="380" fill="#fff5f5" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6b6b" text-anchor="middle">EXPERIENCE</text>
  <rect x="50" y="230" width="300" height="120" fill="#ffffff" stroke="#ffcccc" stroke-width="1" rx="4"/>
  <rect x="50" y="360" width="300" height="120" fill="#fff5f5" stroke="#ffcccc" stroke-width="1" rx="4"/>
  
  <rect x="430" y="180" width="340" height="380" fill="#f0f9ff" stroke="#4ecdc4" stroke-width="2" rx="8"/>
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4ecdc4" text-anchor="middle">EDUCATION &amp; SKILLS</text>
  <rect x="450" y="230" width="300" height="150" fill="#ffffff" stroke="#b3e5e0" stroke-width="1" rx="4"/>
  <rect x="450" y="390" width="300" height="150" fill="#f0f9ff" stroke="#b3e5e0" stroke-width="1" rx="4"/>
  
  <rect x="30" y="580" width="740" height="200" fill="#fffef0" stroke="#45b7d1" stroke-width="2" rx="8"/>
  <text x="400" y="610" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#45b7d1" text-anchor="middle">PROJECTS &amp; ACHIEVEMENTS</text>
  <rect x="50" y="630" width="680" height="130" fill="#ffffff" stroke="#b3d9e6" stroke-width="1" rx="4"/>
  
  <!-- Template Label -->
  <text x="400" y="980" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6" text-anchor="middle">Creative Template</text>
</svg>

