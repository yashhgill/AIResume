<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1000" fill="#ffffff"/>
  <!-- Modern Header with gradient effect -->
  <rect x="0" y="0" width="800" height="140" fill="#667eea"/>
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">JOHN DOE</text>
  <text x="50" y="100" font-family="Arial, sans-serif" font-size="14" fill="#e0e7ff">Software Engineer • email@example.com • +1 234 567 890</text>
  
  <!-- Sidebar -->
  <rect x="0" y="140" width="250" height="860" fill="#f7fafc"/>
  <rect x="250" y="140" width="550" height="860" fill="#ffffff"/>
  
  <!-- Left sidebar content -->
  <text x="125" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">PROFILE</text>
  <rect x="20" y="220" width="210" height="100" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="125" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">SKILLS</text>
  <rect x="20" y="380" width="210" height="150" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Main content -->
  <text x="280" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a202c">EXPERIENCE</text>
  <rect x="280" y="220" width="500" height="140" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="280" y="380" width="500" height="140" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="280" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a202c">EDUCATION</text>
  <rect x="280" y="580" width="500" height="120" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Template Label -->
  <text x="400" y="980" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Modern Template</text>
</svg>

